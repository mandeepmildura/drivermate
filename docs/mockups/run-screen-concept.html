<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>DriverMate — Run</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#ffb59b",
                    "surface-bright": "#31394d",
                    "on-tertiary-fixed-variant": "#812800",
                    "surface-container-high": "#222a3d",
                    "on-surface": "#dae2fd",
                    "on-secondary-container": "#003f38",
                    "inverse-surface": "#dae2fd",
                    "tertiary-fixed": "#ffdbcf",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005048",
                    "on-tertiary-container": "#ffece6",
                    "surface": "#0b1326",
                    "surface-dim": "#0b1326",
                    "primary": "#b8c3ff",
                    "on-primary-fixed": "#001356",
                    "surface-tint": "#b8c3ff",
                    "secondary-fixed-dim": "#4fdbc8",
                    "on-tertiary": "#5b1a00",
                    "outline": "#8e90a2",
                    "on-secondary-fixed": "#00201c",
                    "primary-container": "#2e5bff",
                    "secondary-container": "#04b4a2",
                    "on-surface-variant": "#c4c5d9",
                    "on-secondary": "#003731",
                    "on-background": "#dae2fd",
                    "on-primary": "#002388",
                    "surface-container-highest": "#2d3449",
                    "surface-container-low": "#131b2e",
                    "on-error": "#690005",
                    "on-tertiary-fixed": "#380d00",
                    "inverse-primary": "#124af0",
                    "on-primary-container": "#efefff",
                    "tertiary-container": "#c24100",
                    "background": "#0b1326",
                    "secondary-fixed": "#71f8e4",
                    "primary-fixed": "#dde1ff",
                    "secondary": "#4fdbc8",
                    "tertiary-fixed-dim": "#ffb59b",
                    "surface-container-lowest": "#060e20",
                    "error": "#ffb4ab",
                    "surface-container": "#171f33",
                    "on-primary-fixed-variant": "#0035be",
                    "surface-variant": "#2d3449",
                    "primary-fixed-dim": "#b8c3ff",
                    "outline-variant": "#434656",
                    "inverse-on-surface": "#283044",
                    "error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "12px",
                    "lg": "24px",
                    "container-margin": "20px",
                    "unit": "4px",
                    "sm": "8px",
                    "md": "16px",
                    "xs": "4px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "label-caps": ["Inter"],
                    "body-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "numeric-data": ["Inter"],
                    "title-sm": ["Inter"],
                    "display-lg": ["Manrope"],
                    "headline-md": ["Manrope"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b1326;
            color: #dae2fd;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md overflow-hidden h-screen w-screen flex flex-col">
<!-- Top Status Bar & Header -->
<header class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800/50 fixed top-0 w-full z-50 flex justify-between items-center px-5 h-14">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-500" data-icon="menu">menu</span>
<span class="font-manrope text-lg font-bold tracking-tighter text-slate-100">DriverMate</span>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 px-2 py-1 bg-surface-container rounded border border-outline-variant/30"><span class="material-symbols-outlined text-secondary text-sm" data-icon="sensors" style="font-variation-settings: 'FILL' 1;">sensors</span>
<span class="font-label-caps text-on-surface-variant text-[10px]">SYNCED</span>
</div>
<span class="material-symbols-outlined text-slate-400" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Navigation Area (Canvas) -->
<main class="flex-1 relative mt-14 mb-16 overflow-hidden flex flex-col">
<!-- Map Canvas (Full Background) -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale-[0.2] brightness-[0.4]" data-alt="A top-down detailed navigation map of Mildura, Victoria at dawn. Dark navy streets with glowing cyan and teal route highlights tracing a school bus run through the suburbs. Subtle wireframes for low-rise buildings and a clean high-contrast pointer marking the bus position. Professional dark slate and teal palette." data-location="Mildura" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCSbOsbnjYldtjk_VRz0foaC3vObfDtZ9IPsck8UuzY9R1A3s8nKT8oU117lJ4L8hFi8eKR7ydbiof6OhPZJ76TXVSQdhhm3CN28pwbZaYB-ePrxxepuzvKwEGns35C9MX38VurGkovYNkQ0G1gtfSb7hIXwjQ4lUooXylswasc2HqAAu9HhvUZc-5bhTarcyd02YqJKIJIm01tZNB_GnWGJrHhuqvuyGmqE8cBuEPsFYcKQ8zqSC941QDVVMqgJkbyqkv68WlhyBaj"/>
</div>
<!-- Floating Next Turn Card -->
<div class="relative z-10 px-container-margin pt-md">
<div class="bg-slate-900/95 backdrop-blur-lg border border-slate-700/50 rounded-xl p-md flex items-center gap-md shadow-2xl">
<div class="bg-primary-container text-on-primary-container w-16 h-16 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" data-icon="turn_right">turn_right</span>
</div>
<div class="flex-1">
<div class="flex items-baseline gap-2">
<span class="font-numeric-data text-display-lg text-primary">0.4</span>
<span class="font-label-caps text-on-surface-variant">KM</span>
</div>
<div class="font-headline-md text-on-surface leading-none">Turn Right on Eleventh St</div>
</div>
</div>
</div>
<!-- Center Content Spacer -->
<div class="flex-1"></div>
<!-- Bottom Sheet Controls (Bento Style) -->
<div class="relative z-10 px-container-margin pb-lg">
<div class="grid grid-cols-2 gap-sm">
<!-- Passenger Controls -->
<div class="bg-slate-900/95 backdrop-blur-lg border border-slate-700/50 rounded-xl p-md flex flex-col items-center justify-between col-span-1 min-h-[140px]">
<span class="font-label-caps text-on-surface-variant text-center">BOARDED HERE</span>
<div class="flex items-center gap-md w-full justify-center py-2">
<button class="w-12 h-12 rounded-full border border-slate-700 flex items-center justify-center text-on-surface active:scale-95 transition-transform bg-slate-800">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-numeric-data text-4xl text-primary">04</span>
<button class="w-12 h-12 rounded-full border border-slate-700 flex items-center justify-center text-on-surface active:scale-95 transition-transform bg-slate-800">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
<span class="text-[10px] font-label-caps text-secondary-container/80">STOP: ELEVENTH ST / BENETOOK AVE</span>
</div>
<!-- Trip Stats -->
<div class="bg-slate-900/95 backdrop-blur-lg border border-slate-700/50 rounded-xl p-md flex flex-col justify-between col-span-1">
<div class="flex justify-between items-start">
<div>
<span class="font-label-caps text-on-surface-variant block">ETA</span>
<span class="font-numeric-data text-2xl text-on-surface">08:42</span>
</div>
<div class="text-right">
<span class="font-label-caps text-on-surface-variant block">REMAINING</span>
<span class="font-numeric-data text-2xl text-secondary">12m</span>
</div>
</div>
<div class="h-[1px] bg-slate-800/50 w-full my-sm"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-secondary-container" data-icon="speed" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-body-sm text-on-surface-variant">55 km/h</span>
</div>
</div>
<!-- Action Button -->
<button class="col-span-2 bg-secondary-container text-on-secondary-container font-manrope font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-lg shadow-secondary-container/20">
<span class="material-symbols-outlined" data-icon="assignment_turned_in" style="font-variation-settings: 'FILL' 1;">assignment_turned_in</span>
<span>STOP REACHED</span>
</button>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-slate-900/95 backdrop-blur-lg border-t border-slate-800 fixed bottom-0 w-full z-50 rounded-t-lg shadow-[0_-4px_12px_rgba(0,0,0,0.5)] flex justify-around items-center h-16 px-4 pb-safe">
<!-- Run (Active) -->
<a class="flex flex-col items-center justify-center text-blue-500 bg-blue-500/10 rounded-lg py-1 px-3 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="directions_bus" style="font-variation-settings: 'FILL' 1;">directions_bus</span>
<span class="font-manrope text-[10px] font-medium tracking-wide uppercase">Run</span>
</a>
<!-- Routes -->
<a class="flex flex-col items-center justify-center text-slate-500 py-1 px-3 hover:text-slate-200 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="route">route</span>
<span class="font-manrope text-[10px] font-medium tracking-wide uppercase">Routes</span>
</a>
<!-- Replay -->
<a class="flex flex-col items-center justify-center text-slate-500 py-1 px-3 hover:text-slate-200 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-manrope text-[10px] font-medium tracking-wide uppercase">Replay</span>
</a>
<!-- Account -->
<a class="flex flex-col items-center justify-center text-slate-500 py-1 px-3 hover:text-slate-200 active:scale-95 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-manrope text-[10px] font-medium tracking-wide uppercase">Account</span>
</a>
</nav>
</body></html>
